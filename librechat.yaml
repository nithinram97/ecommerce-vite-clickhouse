version: 1.3.12

mcpServers:
  clickhouse:
    type: stdio
    command: uvx
    args:
      - mcp-clickhouse
    env:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: changeme
      CLICKHOUSE_DATABASE: shopkit
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_READONLY: "true"