apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: shopkit
  labels:
    app: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ghcr.io/YOUR_ORG/shopkit-client:latest   # ← update
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: shopkit
spec:
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
